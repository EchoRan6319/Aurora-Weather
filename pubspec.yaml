name: pureweather
description: "极光天气 - 一款使用 Aurora UI 的天气应用"
publish_to: 'none'

version: 6.0.5+82

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  http: ^1.2.2
  shared_preferences: ^2.5.5
  provider: ^6.1.2
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  flutter_dotenv: ^5.2.1
  intl: ^0.20.1
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.4.0
  dio: ^5.9.2
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  uuid: ^4.5.3
  url_launcher: ^6.3.1
  timezone: ^0.10.1
  lucide_icons_flutter: ^3.1.14+1
  package_info_plus: ^8.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  json_serializable: ^6.9.5
  freezed: ^2.5.8
  riverpod_generator: ^2.6.4
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/



flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icons/app_icon.svg"
  remove_alpha_ios: true

msix_config:
  display_name: 极光天气
  publisher_display_name: EchoRan
  identity_name: com.echoran.pureweather
  logo_path: assets/icons/app_icon.png
  architecture: x64
  capabilities: internetClient, location
  store: false
