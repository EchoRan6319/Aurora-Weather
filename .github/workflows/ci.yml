name: CI

on:
  push:
    branches: [feat/aurora-ui]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.41.3'

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      # - run: flutter test  # uncomment when tests exist

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: flutter pub get
      - name: Generate .env
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          CAIYUN_API_KEY: ${{ secrets.CAIYUN_API_KEY }}
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
          AMAP_WEB_KEY: ${{ secrets.AMAP_WEB_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cat > .env << EOF
          QWEATHER_API_KEY=$QWEATHER_API_KEY
          CAIYUN_API_KEY=$CAIYUN_API_KEY
          AMAP_API_KEY=$AMAP_API_KEY
          AMAP_WEB_KEY=$AMAP_WEB_KEY
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          EOF
      - name: Build APK
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          CAIYUN_API_KEY: ${{ secrets.CAIYUN_API_KEY }}
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
          AMAP_WEB_KEY: ${{ secrets.AMAP_WEB_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          flutter build apk --debug \
            --target-platform=android-arm64 \
            -t lib/main.dart \
            --dart-define=QWEATHER_API_KEY="$QWEATHER_API_KEY" \
            --dart-define=CAIYUN_API_KEY="$CAIYUN_API_KEY" \
            --dart-define=AMAP_API_KEY="$AMAP_API_KEY" \
            --dart-define=AMAP_WEB_KEY="$AMAP_WEB_KEY" \
            --dart-define=DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - name: Generate .env
        shell: pwsh
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          CAIYUN_API_KEY: ${{ secrets.CAIYUN_API_KEY }}
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
          AMAP_WEB_KEY: ${{ secrets.AMAP_WEB_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          @"
          QWEATHER_API_KEY=$env:QWEATHER_API_KEY
          CAIYUN_API_KEY=$env:CAIYUN_API_KEY
          AMAP_API_KEY=$env:AMAP_API_KEY
          AMAP_WEB_KEY=$env:AMAP_WEB_KEY
          DEEPSEEK_API_KEY=$env:DEEPSEEK_API_KEY
          "@ | Set-Content -Path .env -Encoding UTF8
      - name: Build Windows
        shell: pwsh
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          CAIYUN_API_KEY: ${{ secrets.CAIYUN_API_KEY }}
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
          AMAP_WEB_KEY: ${{ secrets.AMAP_WEB_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          flutter build windows --release `
            --dart-define=QWEATHER_API_KEY="$env:QWEATHER_API_KEY" `
            --dart-define=CAIYUN_API_KEY="$env:CAIYUN_API_KEY" `
            --dart-define=AMAP_API_KEY="$env:AMAP_API_KEY" `
            --dart-define=AMAP_WEB_KEY="$env:AMAP_WEB_KEY" `
            --dart-define=DEEPSEEK_API_KEY="$env:DEEPSEEK_API_KEY"
